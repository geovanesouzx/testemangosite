<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mango VS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Alternativa moderna aos ícones) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        /* Ocultar Scrollbar mantendo funcionalidade */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* ==========================================
           ANIMAÇÕES CUSTOMIZADAS (A Mágica acontece aqui)
           ========================================== */
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 20px 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-slide-right { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
        .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        /* Efeito de Stagger (Cascata) para listas */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hover-glow:hover {
            box-shadow: 0 10px 30px -10px rgba(249, 115, 22, 0.5);
            border-color: rgba(249, 115, 22, 0.5);
        }

        /* Título Impact parecido com Netflix/Mango */
        .impact-title {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            letter-spacing: 1px;
        }

        /* Gestão de Views */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease-out forwards; }
        
        #player-view.active { display: flex; }
    </style>
</head>
<body class="selection:bg-orange-500 selection:text-white">

    <!-- ==========================================
         NAVBAR GLOBAL
         ========================================== -->
    <nav id="navbar" class="fixed top-0 w-full z-40 transition-all duration-300 px-4 md:px-12 py-4 md:py-5 flex items-center justify-between bg-gradient-to-b from-[#050505]/90 to-transparent hidden">
        <div class="flex items-center text-white cursor-pointer hover:scale-105 transition-transform" onclick="switchView('home')">
            <span class="text-xl md:text-2xl font-black tracking-tighter">
                MANGO<span class="text-orange-500">VS</span>
            </span>
        </div>

        <div class="hidden md:flex items-center gap-3 absolute left-1/2 -translate-x-1/2">
            <button onclick="switchView('home')" class="nav-btn px-5 py-1.5 rounded-full text-sm font-medium transition bg-white/5 hover:bg-white/20 text-white" data-target="home">Início</button>
            <button onclick="switchView('catalog')" class="nav-btn px-5 py-1.5 rounded-full text-sm font-medium transition bg-white/5 hover:bg-white/20 text-white" data-target="catalog">Catálogo</button>
        </div>

        <div class="flex items-center gap-4 md:gap-6 text-white">
            <button class="transition hover:text-orange-500 hover:scale-110" onclick="alert('Busca em breve!')">
                <i class="ph ph-magnifying-glass text-xl"></i>
            </button>
            <button class="relative hover:text-gray-300 transition hover:scale-110" onclick="switchView('profiles')">
                <div id="nav-avatar" class="w-8 h-8 rounded-full bg-gray-800 border-2 border-transparent hover:border-orange-500 transition-colors overflow-hidden">
                    <img src="" alt="Avatar" class="w-full h-full object-cover">
                </div>
            </button>
        </div>
    </nav>

    <!-- Mobile Bottom Nav -->
    <div id="mobile-nav" class="md:hidden fixed bottom-0 w-full z-40 bg-[#050505]/95 backdrop-blur-md border-t border-white/10 flex items-center justify-around py-3 px-2 hidden">
        <button onclick="switchView('home')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition">
            <i class="ph-fill ph-house text-xl"></i><span class="text-[10px] font-medium">Início</span>
        </button>
        <button onclick="switchView('catalog')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition">
            <i class="ph-fill ph-squares-four text-xl"></i><span class="text-[10px] font-medium">Catálogo</span>
        </button>
    </div>

    <!-- ==========================================
         VIEWS (TELAS)
         ========================================== -->
    
    <!-- 1. LOGIN -->
    <div id="login-view" class="view min-h-screen relative overflow-hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-[#111520] pointer-events-none"></div>
        <div class="relative z-10 flex flex-col items-center max-w-sm w-full animate-slide-up">
            <span class="text-6xl font-black tracking-tighter text-white mb-6 drop-shadow-2xl hover:scale-105 transition-transform duration-500">
                MANGO<span class="text-orange-500">VS</span>
            </span>
            <p class="text-gray-400 text-center text-sm mb-12">Milhares de episódios esperando por você.<br/>Faça login para continuar.</p>
            
            <button id="btn-login" class="w-full bg-white text-black py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-gray-200 hover:scale-105 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                <i class="ph-fill ph-google-logo text-xl text-blue-500"></i>
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- 2. PERFIS -->
    <div id="profiles-view" class="view min-h-screen flex flex-col items-center justify-center relative p-6">
        <h1 class="text-3xl md:text-5xl font-bold text-white mb-12 animate-slide-up">Quem está assistindo?</h1>
        
        <div id="profiles-container" class="flex gap-6 flex-wrap justify-center max-w-3xl px-6">
            <!-- Injetado via JS -->
        </div>

        <button id="btn-logout" class="mt-20 text-gray-500 hover:text-white transition animate-fade-in stagger-5">Sair da Conta</button>
    </div>

    <!-- Modal de PIN -->
    <div id="pin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden backdrop-blur-sm transition-opacity">
        <div class="bg-[#18181B] border border-white/10 p-8 rounded-2xl flex flex-col items-center w-[320px] animate-scale-in">
            <h2 class="text-xl font-bold text-white mb-6">Digite o PIN</h2>
            <input type="password" id="pin-input" maxlength="4" class="w-full bg-white/5 border border-white/10 text-center text-3xl tracking-[1em] py-4 rounded-xl text-white outline-none transition focus:border-orange-500 focus:shadow-[0_0_15px_rgba(249,115,22,0.3)]">
            <span id="pin-error" class="text-red-500 text-xs mt-2 hidden">PIN Incorreto.</span>
            
            <div class="flex w-full gap-3 mt-8">
                <button onclick="closePinModal()" class="flex-1 py-3 text-gray-400 hover:text-white font-medium transition">Cancelar</button>
                <button id="btn-submit-pin" class="flex-1 py-3 bg-white text-black font-bold rounded-xl hover:bg-orange-500 hover:text-white transition-colors">Entrar</button>
            </div>
        </div>
    </div>

    <!-- 3. HOME -->
    <div id="home-view" class="view pb-24 md:pb-10">
        <!-- Hero Slider Injetado via JS -->
        <div id="hero-container" class="relative w-full h-[80vh] md:h-[90vh] flex items-center overflow-hidden bg-[#050505] group"></div>
        
        <div class="relative z-30 -mt-12" id="home-carousels">
            <!-- Carrosseis Injetados via JS -->
        </div>
    </div>

    <!-- 4. CATÁLOGO -->
    <div id="catalog-view" class="view pt-32 px-6 pb-24 min-h-screen">
        <h2 class="text-3xl font-bold mb-8 animate-slide-up border-l-4 border-orange-500 pl-4">Catálogo Completo</h2>
        <div id="catalog-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6">
            <!-- Injetado via JS -->
        </div>
    </div>

    <!-- 5. DETALHES -->
    <div id="details-view" class="view min-h-screen pb-24 md:pb-20 relative">
        <div class="absolute top-0 left-0 w-full h-[60vh] md:h-[85vh] z-0">
            <img id="det-backdrop" src="" class="w-full h-full object-cover object-top opacity-50 transition-opacity duration-1000">
            <div class="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/90 to-transparent w-full md:w-3/4"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/40 to-transparent"></div>
        </div>

        <div class="relative z-10 px-4 md:px-16 pt-20 md:pt-32">
            <button onclick="switchView('home')" class="text-gray-400 hover:text-white flex items-center gap-2 mb-8 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full w-max transition hover:bg-white/10 hover:scale-105 animate-slide-right">
                <i class="ph text-xl ph-arrow-left"></i> <span class="text-sm font-bold">Voltar</span>
            </button>

            <div class="max-w-2xl animate-slide-up stagger-1">
                <h1 id="det-title" class="text-white text-5xl md:text-7xl uppercase mb-4 drop-shadow-lg impact-title text-orange-500">
                    <!-- Titulo -->
                </h1>

                <div class="flex flex-wrap items-center gap-3 text-xs font-bold mb-6 text-gray-300" id="det-meta">
                    <!-- Meta info -->
                </div>

                <p id="det-synopsis" class="text-gray-300 text-sm md:text-base leading-relaxed mb-8">
                    <!-- Sinopse -->
                </p>

                <div class="flex flex-wrap items-center gap-4 mb-12" id="det-actions">
                    <!-- Botoes injetados -->
                </div>
            </div>

            <!-- Seção de Episódios (se for série) -->
            <div id="det-episodes-section" class="mt-12 hidden animate-slide-up stagger-2">
                <div class="flex items-center gap-4 mb-6">
                    <select id="det-season-select" class="bg-[#18181B] text-white border border-white/10 rounded-xl px-4 py-3 font-bold outline-none cursor-pointer hover:border-orange-500 transition">
                        <!-- Options -->
                    </select>
                    <span id="det-ep-count" class="text-gray-500 text-sm font-medium"></span>
                </div>

                <div id="det-episodes-list" class="flex flex-col gap-3 max-w-4xl">
                    <!-- EPs -->
                </div>
            </div>
        </div>
    </div>

    <!-- 6. PLAYER -->
    <div id="player-view" class="view fixed inset-0 bg-black z-50 flex-col group hidden">
        <video id="video-element" class="absolute inset-0 w-full h-full object-contain"></video>
        
        <!-- Overlay Controles -->
        <div id="player-controls" class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90 transition-opacity duration-300 flex flex-col justify-between">
            
            <div class="p-6 flex items-center gap-4">
                <button onclick="closePlayer()" class="p-2 bg-white/10 hover:bg-white/30 hover:scale-110 rounded-full text-white backdrop-blur-md transition-all">
                    <i class="ph text-2xl ph-arrow-left"></i>
                </button>
                <h2 id="player-title" class="text-white font-bold text-lg drop-shadow-md">Título</h2>
            </div>

            <div class="flex items-center justify-center gap-12 pointer-events-auto">
                <button onclick="seekVideo(-10)" class="p-4 rounded-full hover:bg-white/10 text-white transition hover:scale-110 hover:text-orange-500">
                    <i class="ph-fill text-4xl ph-rewind-circle"></i>
                </button>
                <button id="btn-play-pause" class="w-20 h-20 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white transition hover:scale-110 hover:border-orange-500 hover:shadow-[0_0_20px_rgba(249,115,22,0.4)]">
                    <i class="ph-fill text-5xl ph-pause" id="play-pause-icon"></i>
                </button>
                <button onclick="seekVideo(10)" class="p-4 rounded-full hover:bg-white/10 text-white transition hover:scale-110 hover:text-orange-500">
                    <i class="ph-fill text-4xl ph-fast-forward-circle"></i>
                </button>
            </div>

            <div class="p-8 w-full max-w-5xl mx-auto pointer-events-auto">
                <!-- Custom Progress Bar -->
                <div id="progress-container" class="w-full h-2 bg-white/20 rounded-full mb-6 cursor-pointer relative overflow-hidden group/bar transition-all hover:h-4">
                    <div id="progress-bar" class="absolute top-0 left-0 h-full bg-orange-500 rounded-full transition-all ease-linear" style="width: 0%"></div>
                </div>

                <div class="flex items-center justify-between">
                    <span id="time-display" class="text-white font-medium">00:00 / 00:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         LÓGICA JAVASCRIPT (MODULAR)
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuração Firebase do Usuário
        const firebaseConfig = {
            apiKey: "AIzaSyDLGgSoNwLy_f6FRG3jHmlNJ5AIb9MC7fs",
            authDomain: "mango-anime.firebaseapp.com",
            projectId: "mango-anime",
            storageBucket: "mango-anime.firebasestorage.app",
            messagingSenderId: "269303739791",
            appId: "1:269303739791:web:bee162ff744b83e41187fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ESTADO GLOBAL ---
        let currentUser = null;
        let activeProfile = null;
        let dbContents = [];
        let dbCarousels = [];
        let dbTop10 = [];
        let currentItem = null;
        let unsubscribeList = [];
        
        let heroInterval = null;
        let controlsTimeout = null;

        // --- HELPERS (Imagens e Base64) ---
        const IMG_BASE = "https://image.tmdb.org/t/p/original";
        const IMG_POSTER = "https://image.tmdb.org/t/p/w500";
        
        const resolveImg = (path, isPoster = false) => {
            if (!path) return 'https://via.placeholder.com/500x750?text=Sem+Capa';
            if (path.startsWith('http')) return path;
            return isPoster ? `${IMG_POSTER}${path}` : `${IMG_BASE}${path}`;
        };

        const decodeB64 = (str) => {
            if (!str || str === 'none') return '';
            try { return decodeURIComponent(atob(str)); } catch(e) { return ''; }
        };

        const formatTime = (seconds) => {
            if (isNaN(seconds) || seconds < 0) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        // --- NAVEGAÇÃO E VIEWS ---
        window.switchView = (viewId, item = null) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewId}-view`).classList.add('active');
            
            const nav = document.getElementById('navbar');
            const mobileNav = document.getElementById('mobile-nav');
            
            if (viewId === 'login' || viewId === 'profiles' || viewId === 'player') {
                nav.classList.add('hidden');
                mobileNav.classList.add('hidden');
            } else {
                nav.classList.remove('hidden');
                mobileNav.classList.remove('hidden');
            }

            // Atualiza botões da navbar
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === viewId) {
                    btn.className = "nav-btn px-5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-black shadow-md";
                } else {
                    btn.className = "nav-btn px-5 py-1.5 rounded-full text-sm font-medium transition bg-white/5 hover:bg-white/20 text-white";
                }
            });

            if (viewId === 'home') renderHome();
            if (viewId === 'catalog') renderCatalog();
            if (viewId === 'details' && item) {
                currentItem = item;
                renderDetails(item);
            }
            window.scrollTo(0, 0);
        };

        // --- AUTENTICAÇÃO ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                await setDoc(doc(db, "users", result.user.uid), { 
                    email: result.user.email, lastLogin: Date.now() 
                }, { merge: true });
            } catch (error) {
                alert("Erro no login: " + error.message);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                if (!activeProfile) fetchProfiles();
            } else {
                activeProfile = null;
                unsubscribeAll();
                switchView('login');
            }
        });

        // --- DADOS (FIRESTORE) ---
        const fetchProfiles = () => {
            const unsub = onSnapshot(collection(db, "users", currentUser.uid, "profiles"), (snap) => {
                const profiles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProfilesScreen(profiles);
                switchView('profiles');
            });
            unsubscribeList.push(unsub);
        };

        const subscribeData = () => {
            unsubscribeAll(); // limpa anteriores
            
            // Contents
            unsubscribeList.push(onSnapshot(collection(db, "content"), snap => {
                dbContents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (document.getElementById('home-view').classList.contains('active')) renderHome();
            }));

            // Carousels
            unsubscribeList.push(onSnapshot(collection(db, "carousels"), snap => {
                dbCarousels = snap.docs.map(d => ({ id: d.id, ...d.data(), type: 'normal' }));
            }));

            unsubscribeList.push(onSnapshot(collection(db, "top10_carousels"), snap => {
                dbTop10 = snap.docs.map(d => ({ id: d.id, ...d.data(), type: 'top10' }));
            }));
        };

        const unsubscribeAll = () => {
            unsubscribeList.forEach(unsub => unsub());
            unsubscribeList = [];
        };

        // --- RENDERIZAÇÕES ---

        // PERFIS
        let selectedProfileForPin = null;
        
        const renderProfilesScreen = (profiles) => {
            const container = document.getElementById('profiles-container');
            container.innerHTML = '';

            profiles.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = `flex flex-col items-center group cursor-pointer animate-scale-in stagger-${(index % 5) + 1}`;
                
                let lockIcon = p.pin ? `<div class="absolute -bottom-2 right-1/2 translate-x-1/2 bg-black/80 p-1.5 rounded-md"><i class="ph-fill ph-lock-key text-white text-xs"></i></div>` : '';
                let frameImg = p.frameUrl ? `<img src="${p.frameUrl}" class="absolute inset-0 w-full h-full object-cover pointer-events-none">` : '';

                div.innerHTML = `
                    <div class="relative w-32 h-32 flex items-center justify-center group">
                        <img src="${p.avatarUrl || 'https://ui-avatars.com/api/?name=U&background=151C2C&color=F8FAFC&size=200'}" class="w-24 h-24 rounded-full object-cover border-2 border-[#050505] shadow-lg transition-transform group-hover:scale-110 group-hover:shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                        ${frameImg}
                        ${lockIcon}
                    </div>
                    <span class="mt-4 text-gray-400 font-medium group-hover:text-white transition">${p.name}</span>
                `;
                
                div.onclick = () => {
                    if (p.pin) {
                        selectedProfileForPin = p;
                        document.getElementById('pin-modal').classList.remove('hidden');
                        document.getElementById('pin-input').value = '';
                        document.getElementById('pin-input').focus();
                    } else {
                        loginProfile(p);
                    }
                };
                container.appendChild(div);
            });
        };

        document.getElementById('btn-submit-pin').addEventListener('click', () => {
            const pinVal = document.getElementById('pin-input').value;
            if (pinVal === selectedProfileForPin.pin) {
                document.getElementById('pin-modal').classList.add('hidden');
                loginProfile(selectedProfileForPin);
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').classList.add('border-red-500');
            }
        });

        window.closePinModal = () => {
            document.getElementById('pin-modal').classList.add('hidden');
            document.getElementById('pin-error').classList.add('hidden');
            document.getElementById('pin-input').classList.remove('border-red-500');
        };

        const loginProfile = (profile) => {
            activeProfile = profile;
            document.getElementById('nav-avatar').querySelector('img').src = profile.avatarUrl || 'https://ui-avatars.com/api/?name=U&background=151C2C&color=F8FAFC&size=200';
            subscribeData();
            switchView('home');
        };

        // HOME
        const renderHome = () => {
            if (dbContents.length === 0) return;

            const lancamentos = [...dbContents].sort((a, b) => (parseInt(b.year)||0) - (parseInt(a.year)||0) || b.addedAt - a.addedAt).slice(0, 15);
            const recentes = [...dbContents].sort((a, b) => b.addedAt - a.addedAt).slice(0, 15);
            
            renderHero(lancamentos.slice(0, 5));

            let carouselsHTML = '';
            carouselsHTML += generateRowHTML('Lançamentos', lancamentos);
            carouselsHTML += generateRowHTML('Adicionados Recentemente', recentes);

            const allCarousels = [...dbCarousels, ...dbTop10].sort((a,b) => (a.order||99) - (b.order||99));
            allCarousels.forEach(car => {
                const items = car.items?.map(id => dbContents.find(c => c.id === id)).filter(Boolean) || [];
                if(items.length > 0) {
                    carouselsHTML += generateRowHTML(car.title, items, car.type === 'top10');
                }
            });

            document.getElementById('home-carousels').innerHTML = carouselsHTML;
        };

        const renderHero = (items) => {
            if(items.length === 0) return;
            let current = 0;
            const container = document.getElementById('hero-container');
            
            const drawHero = () => {
                const item = items[current];
                container.innerHTML = `
                    <div class="absolute inset-0 w-full h-full animate-fade-in">
                        <img src="${resolveImg(item.backdrop || item.poster)}" class="w-full h-full object-cover object-top opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/90 md:via-[#050505]/60 to-transparent w-full md:w-3/4"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/30 to-transparent"></div>
                    </div>
                    <div class="relative z-20 w-full px-6 md:px-16 pt-20 flex justify-between items-center animate-slide-right">
                        <div class="max-w-2xl">
                            <h1 class="text-white font-black text-4xl md:text-6xl uppercase tracking-tighter mb-4 drop-shadow-lg impact-title text-orange-500">${item.title}</h1>
                            <div class="flex flex-wrap items-center gap-3 text-xs font-semibold mb-6 text-gray-300">
                                <span class="bg-white/20 text-white px-2 py-0.5 rounded text-[10px]">${item.type === 'tv' ? 'SÉRIE' : 'FILME'}</span>
                                <span class="text-orange-500 text-lg leading-none">•</span>
                                <span>${item.year}</span>
                            </div>
                            <p class="text-gray-300 text-xs md:text-base mb-8 leading-relaxed max-w-md line-clamp-3">${item.synopsis || "Nenhuma sinopse disponível."}</p>
                            <div class="flex gap-4">
                                <button onclick='playContent("${item.id}")' class="bg-white text-black px-8 py-3 rounded-xl hover:bg-orange-500 hover:text-white transition-colors flex items-center justify-center gap-2 font-bold text-sm shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:shadow-[0_0_20px_rgba(249,115,22,0.5)]">
                                    <i class="ph-fill ph-play text-lg"></i> Assistir
                                </button>
                                <button onclick='openDetails("${item.id}")' class="glass-panel text-white px-8 py-3 rounded-xl hover:bg-white/20 transition flex items-center justify-center gap-2 font-bold text-sm">
                                   Detalhes
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            };

            drawHero();
            if(heroInterval) clearInterval(heroInterval);
            heroInterval = setInterval(() => {
                current = (current + 1) % items.length;
                drawHero();
            }, 8000);
        };

        const generateRowHTML = (title, items, isNumbered = false) => {
            let cardsHTML = '';
            items.forEach((item, index) => {
                const img = resolveImg(item.poster, true);
                if (isNumbered) {
                    cardsHTML += `
                        <div onclick='openDetails("${item.id}")' class="relative flex-none w-[180px] h-[190px] rounded-xl overflow-hidden cursor-pointer snap-start bg-[#1a1a1a] group/card shadow-lg hover-glow transition-all animate-scale-in" style="animation-delay: ${index * 0.05}s">
                            <div class="w-full h-full relative flex justify-end">
                                <div class="w-[120px] h-full relative">
                                    <img src="${img}" class="w-full h-full object-cover rounded-xl transition-transform duration-500 group-hover/card:scale-105" loading="lazy">
                                </div>
                                <div class="absolute bottom-[-10px] left-[-5px]">
                                    <span class="text-[120px] font-black text-black impact-title" style="-webkit-text-stroke: 3px white;">${index + 1}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    cardsHTML += `
                        <div onclick='openDetails("${item.id}")' class="relative flex-none w-[130px] md:w-[150px] aspect-[2/3] rounded-xl overflow-hidden cursor-pointer snap-start bg-[#1a1a1a] group/card shadow-lg hover-glow transition-all animate-scale-in" style="animation-delay: ${index * 0.05}s">
                            <img src="${img}" class="w-full h-full object-cover transition-transform duration-500 group-hover/card:scale-110" loading="lazy">
                            <div class="absolute inset-0 bg-black/0 group-hover/card:bg-black/40 transition-colors duration-300"></div>
                        </div>
                    `;
                }
            });

            return `
                <div class="mb-10 px-4 md:px-12 group relative">
                    <h2 class="text-lg md:text-xl font-bold text-white mb-4 flex items-center gap-2 animate-slide-up">
                        ${title} <i class="ph-bold ph-caret-right text-gray-500"></i>
                    </h2>
                    <div class="flex gap-4 overflow-x-auto scrollbar-hide pb-4 snap-x relative z-10" style="scroll-behavior: smooth;">
                        ${cardsHTML}
                    </div>
                </div>
            `;
        };

        // CATALOGO
        const renderCatalog = () => {
            const grid = document.getElementById('catalog-grid');
            let html = '';
            dbContents.forEach((item, index) => {
                html += `
                    <div onclick='openDetails("${item.id}")' class="aspect-[2/3] rounded-xl overflow-hidden cursor-pointer group bg-[#1a1a1a] shadow-lg hover-glow transition-all animate-scale-in" style="animation-delay: ${(index%20) * 0.05}s">
                        <img src="${resolveImg(item.poster, true)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                `;
            });
            grid.innerHTML = html;
        };

        // EXPOSTAS GLOBALMENTE PARA ONCLICK
        window.openDetails = (id) => {
            const item = dbContents.find(c => c.id === id);
            if(item) switchView('details', item);
        };

        window.playContent = (id, epId = null) => {
            const item = dbContents.find(c => c.id === id);
            if(!item) return;

            let targetEp = null;
            if (item.type === 'tv') {
                targetEp = epId ? item.episodes?.find(e => e.id === epId) : item.episodes?.[0];
                if (!targetEp) { alert("Nenhum episódio disponível."); return; }
            }

            openPlayer(item, targetEp);
        };

        // DETALHES
        const renderDetails = (item) => {
            document.getElementById('det-backdrop').src = resolveImg(item.backdrop || item.poster);
            document.getElementById('det-title').innerText = item.title;
            document.getElementById('det-synopsis').innerText = item.synopsis || "Sem sinopse disponível.";
            
            const metaHTML = `
                <span class="bg-orange-500 text-white px-2 py-0.5 rounded text-[10px] shadow-lg shadow-orange-500/50">${item.type === 'tv' ? 'SÉRIE' : 'FILME'}</span>
                <span class="text-gray-500">•</span><span>${item.year}</span>
                <span class="text-gray-500">•</span><span>${item.genres?.join(' • ')}</span>
            `;
            document.getElementById('det-meta').innerHTML = metaHTML;

            const actionsHTML = `
                <button onclick='playContent("${item.id}")' class="bg-white text-black px-8 py-3.5 rounded-xl hover:bg-orange-500 hover:text-white transition-colors duration-300 flex items-center gap-2 font-black text-sm shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:shadow-[0_0_25px_rgba(249,115,22,0.6)] hover:scale-105">
                    <i class="ph-fill ph-play text-xl"></i> ASSISTIR
                </button>
            `;
            document.getElementById('det-actions').innerHTML = actionsHTML;

            const epSection = document.getElementById('det-episodes-section');
            if (item.type === 'tv' && item.episodes?.length > 0) {
                epSection.classList.remove('hidden');
                const seasons = [...new Set(item.episodes.map(e => e.seasonNumber))];
                
                const sel = document.getElementById('det-season-select');
                sel.innerHTML = seasons.map(s => `<option value="${s}">Temporada ${s}</option>`).join('');
                sel.onchange = (e) => renderEpisodes(item, Number(e.target.value));
                
                renderEpisodes(item, seasons[0]);
            } else {
                epSection.classList.add('hidden');
            }
        };

        const renderEpisodes = (item, seasonNum) => {
            const eps = item.episodes.filter(e => e.seasonNumber === seasonNum);
            document.getElementById('det-ep-count').innerText = `${eps.length} episódios`;
            
            let epsHTML = '';
            eps.forEach((ep, i) => {
                const dualBadge = (ep.url && ep.url !== 'none' && ep.altUrl && ep.altUrl !== 'none') ? `<span class="bg-purple-600 text-white text-[9px] px-1.5 py-0.5 rounded font-bold shadow-lg shadow-purple-600/50">DUAL</span>` : '';
                epsHTML += `
                    <div onclick='playContent("${item.id}", "${ep.id}")' class="flex items-center gap-4 p-3 rounded-xl glass-panel hover:bg-white/10 hover-glow transition-all cursor-pointer group animate-slide-up" style="animation-delay: ${i*0.1}s">
                        <div class="relative w-32 md:w-48 aspect-video rounded-lg overflow-hidden shrink-0">
                            <img src="${resolveImg(ep.thumb || item.backdrop)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition duration-300"></div>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                                <div class="p-2 bg-orange-500 rounded-full shadow-[0_0_15px_rgba(249,115,22,0.8)] scale-75 group-hover:scale-100 transition-transform">
                                    <i class="ph-fill ph-play text-white"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-white font-bold text-sm md:text-base line-clamp-1 group-hover:text-orange-400 transition-colors">${ep.epNumber}. ${ep.title || `Episódio ${ep.epNumber}`}</h4>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-gray-400 text-xs font-medium"><i class="ph ph-clock"></i> 24 min</span>
                                ${dualBadge}
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('det-episodes-list').innerHTML = epsHTML;
        };

        // --- PLAYER DE VÍDEO COMPLETO ---
        const videoEl = document.getElementById('video-element');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');
        const playPauseIcon = document.getElementById('play-pause-icon');
        const playerControls = document.getElementById('player-controls');

        const openPlayer = (item, ep) => {
            const urlB64 = ep ? ep.url : item.url;
            const title = ep ? `T${ep.seasonNumber}:E${ep.epNumber} - ${item.title}` : item.title;
            
            document.getElementById('player-title').innerText = title;
            videoEl.src = decodeB64(urlB64);
            switchView('player');
            videoEl.play();
            resetControlsTimer();
        };

        window.closePlayer = () => {
            videoEl.pause();
            videoEl.src = "";
            switchView('details', currentItem);
        };

        // Lógica Custom Player
        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if(videoEl.paused) videoEl.play(); else videoEl.pause();
            resetControlsTimer();
        });

        window.seekVideo = (sec) => {
            videoEl.currentTime += sec;
            resetControlsTimer();
        };

        videoEl.addEventListener('play', () => {
            playPauseIcon.className = "ph-fill text-5xl ph-pause";
            resetControlsTimer();
        });
        
        videoEl.addEventListener('pause', () => {
            playPauseIcon.className = "ph-fill text-5xl ph-play";
            playerControls.classList.remove('opacity-0', 'pointer-events-none');
        });

        videoEl.addEventListener('timeupdate', () => {
            if (!videoEl.duration) return;
            const percent = (videoEl.currentTime / videoEl.duration) * 100;
            progressBar.style.width = `${percent}%`;
            timeDisplay.innerText = `${formatTime(videoEl.currentTime)} / ${formatTime(videoEl.duration)}`;
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            videoEl.currentTime = pos * videoEl.duration;
            resetControlsTimer();
        });

        // Hide controls after 3 seconds of inactivity
        const resetControlsTimer = () => {
            playerControls.classList.remove('opacity-0', 'pointer-events-none');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            if (!videoEl.paused) {
                controlsTimeout = setTimeout(() => {
                    playerControls.classList.add('opacity-0', 'pointer-events-none');
                }, 3000);
            }
        };

        document.getElementById('player-view').addEventListener('mousemove', resetControlsTimer);
        document.getElementById('player-view').addEventListener('click', resetControlsTimer);

    </script>
</body>
</html>
